  if (level >= 5) {

             RP_L,RP_R,RP_SRF,RP_BANK, landW, salmonStartX:215,salmonStartY:LP_SRF+28 };

  const ge=(level-1)*41, he=(level-1)*36;
  const LP_R=450, RP_L=515+ge, RP_R=900;
  const LP_SRF=305, LP_BANK=432;
  const RP_SRF=Math.max(85,200-he), RP_BANK=432;
  const landW=Math.max(80,225-(level-1)*52);

}

function getJumpPonds(L) {
  if (!L.two || jumpPhase===0) {

             tgtSRF:L.two?L.MP_SRF:L.RP_SRF, tgtBANK:L.two?L.MP_BANK:L.RP_BANK };
  }

           tgtL:L.RP_L, tgtR:L.RP_R, tgtSRF:L.RP_SRF, tgtBANK:L.RP_BANK };
}

function generateWind() {
  if (level<3) { windForce=0; return; }
  const maxW=0.28+(level-3)*0.09;
  windForce=Math.round((Math.random()*2-1)*maxW*10)/10;
  if (Math.abs(windForce)<0.06) windForce=0;
}

function drawWindIndicator() {
  if (!windForce) return;
  const dir=windForce>0?1:-1;
  const maxW=0.28+(level-3)*0.09;
  const pct=Math.min(1,Math.abs(windForce)/maxW);
  const col=pct<0.4?'#FFEE44':pct<0.75?'#FF8822':'#FF3333';
  const bx=W/2-155, by=104;
  ctx.fillStyle='rgba(0,0,40,0.82)'; ctx.fillRect(bx,by,310,50);
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(bx,by,310,50);
  ctx.fillStyle=col; ctx.font='bold 12px "Courier New"'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText('WIND',bx+10,by+25);
  const barX=bx+62, bw=170, barY=by+18;
  ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(barX,barY,bw,14);
  ctx.fillStyle=col;
  if (dir>0) ctx.fillRect(barX+bw/2,barY,pct*bw/2,14);
  else ctx.fillRect(barX+bw/2-pct*bw/2,barY,pct*bw/2,14);
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.fillRect(barX+bw/2-1,barY-2,2,18);
  const str=pct<0.4?'LIGHT':pct<0.75?'MODERATE':'STRONG';
  ctx.fillStyle=col; ctx.font='9px "Courier New"'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText(str,barX+bw/2,barY+16);
  ctx.fillStyle=col; ctx.font='bold 28px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(dir>0?'→':'←',bx+285,by+25);
}

let askedQs = new Set();
function pickQuestion(diff) {
  let pool = QBANK.filter(q => q.d === diff && !askedQs.has(q));
  if (!pool.length) { askedQs.clear(); pool = QBANK.filter(q => q.d === diff); }
  const q = pool[Math.floor(Math.random() * pool.length)];
  askedQs.add(q);
  return { ...q };
}

let musicOn = true, sfxOn = true;
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol=0.18, delay=0) {
  if (!sfxOn) return;
  try {
    const a=getAudio(), o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type; o.frequency.setValueAtTime(freq,a.currentTime+delay);
    g.gain.setValueAtTime(vol,a.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+dur);
    o.start(a.currentTime+delay); o.stop(a.currentTime+delay+dur);
  } catch(e){}
}
function sfxCollect(pts) {
  const f=pts===50?440:pts===100?550:880;
  playTone(f,'sine',0.12,0.15);
  if (pts===250) playTone(f*1.5,'sine',0.15,0.1,0.08);
}
function sfxFrog()   { [880,1100,1320].forEach((f,i)=>playTone(f,'sine',0.12,0.18,i*0.06)); }
function sfxHit()    { playTone(150,'sawtooth',0.18,0.28); }
function sfxWrong()  { [330,220].forEach((f,i)=>playTone(f,'square',0.15,0.18,i*0.1)); }
function sfxRight()  { [440,550,660].forEach((f,i)=>playTone(f,'sine',0.12,0.18,i*0.07)); }
function sfxSplash() { [220,440,880,440].forEach((f,i)=>playTone(f,'sine',0.1,0.2,i*0.05)); }
function sfxMiss()   { [330,220,150].forEach((f,i)=>playTone(f,'sawtooth',0.1,0.2,i*0.07)); }
function sfxHeart()  { playTone(660,'sine',0.15,0.2); playTone(880,'sine',0.12,0.15,0.1); }

const bubbles = [];
function initBubbles() {
  bubbles.length = 0;
  for (let i=0;i<30;i++) bubbles.push(mkBubble(Math.random()*W,true));
}
function mkBubble(x,anyY=false) {
  return { x, y:anyY?WATER_TOP+Math.random()*(WATER_BOT-WATER_TOP)*0.9:WATER_BOT-20,
           r:1.5+Math.random()*3.5, sp:0.25+Math.random()*0.45,
           wb:Math.random()*6.28, ws:0.018+Math.random()*0.022 };
}
function updateBubbles(minY=WATER_TOP,maxY=WATER_BOT) {
  for (const b of bubbles) {
    b.y-=b.sp; b.wb+=b.ws; b.x+=Math.sin(b.wb)*0.35;
    if (b.y<minY) { b.y=maxY-10; b.x=Math.random()*W; b.r=1.5+Math.random()*3.5; }
  }
}
function drawBubbles() {
  for (const b of bubbles) {
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.strokeStyle='rgba(168,228,255,0.4)'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='rgba(168,228,255,0.07)'; ctx.fill();
  }
}

function drawBackground() {

  wg.addColorStop(0,e.waterTop); wg.addColorStop(1,e.waterBot);
  ctx.fillStyle=wg; ctx.fillRect(0,WATER_TOP,W,WATER_BOT-WATER_TOP);

  for (let i=0;i<5;i++) {
    const rx=80+i*200+Math.sin(t*0.008+i*1.2)*20;
    const rg=ctx.createLinearGradient(rx,WATER_TOP,rx+30,460);
    rg.addColorStop(0,'rgba(255,255,255,0.07)'); rg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.moveTo(rx-10,WATER_TOP); ctx.lineTo(rx+44,WATER_TOP);
    ctx.lineTo(rx+58,WATER_BOT-60); ctx.lineTo(rx-4,WATER_BOT-60); ctx.closePath(); ctx.fill();
  }

  ctx.beginPath(); ctx.moveTo(0,WATER_TOP);
  for (let x=0;x<=W;x+=4)
    ctx.lineTo(x,WATER_TOP+Math.sin(x*0.022+t*0.04)*3.5+Math.sin(x*0.054+t*0.026)*1.8);
  ctx.lineTo(W,0); ctx.lineTo(0,0); ctx.closePath();

  fg.addColorStop(0,'#a8e4ff'); fg.addColorStop(1,e.waterTop);
  ctx.fillStyle=fg; ctx.fill();

  ctx.fillStyle='#5C420A'; ctx.fillRect(0,WATER_BOT,W,H-WATER_BOT);

  ctx.beginPath(); ctx.moveTo(0,WATER_BOT+3);
  for (let x=0;x<=W;x+=7)
    ctx.lineTo(x,WATER_BOT+2+Math.sin(x*0.14+scrollDist*0.009)*4);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  drawScrollingPlants(e.plantCols);
}

const PLT_SP = 85;
function drawScrollingPlants(cols) {
  const n=Math.ceil(W/PLT_SP)+2;
  const off=scrollDist%PLT_SP;
  const fi=Math.floor(scrollDist/PLT_SP);
  for (let i=0;i<n;i++) {
    const pi=fi+i;
    const px=i*PLT_SP-off;
    const seed=((pi*2654435761)>>>0)%1000;
    const ph=40+(seed%6)*10;
    const pc=cols[seed%3];
    const sway=Math.sin(t*0.03+pi*1.4)*9;
    ctx.strokeStyle=pc; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(px,WATER_BOT);
    ctx.quadraticCurveTo(px+sway*0.5,WATER_BOT-ph*0.5,px+sway,WATER_BOT-ph);
    ctx.stroke();
    for (let l=0;l<3;l++) {
      const ly=WATER_BOT-ph*(0.28+l*0.26);
      const lx=px+sway*(0.28+l*0.28);
      const d=(seed%3+l)%2===0?1:-1;
      ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.moveTo(lx,ly);
      ctx.quadraticCurveTo(lx+d*16+sway*0.4,ly-9,lx+d*6,ly-20); ctx.stroke();
    }
    if (seed%4===0) {
      ctx.fillStyle=`hsl(${30+seed%30},${20+seed%20}%,${30+seed%20}%)`;
      ctx.beginPath(); ctx.ellipse(px+(seed%40)-20,WATER_BOT+10,10+(seed%14),6+(seed%5),0,0,Math.PI*2); ctx.fill();
    }
  }
}

  ctx.strokeStyle='rgba(200,200,200,0.4)'; ctx.lineWidth=1; ctx.setLineDash([3,5]);

  ctx.strokeStyle='#D0D0D0'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(hx,hy); ctx.arc(hx-3.5,hy+5.5,5.5,-Math.PI*0.5,Math.PI*0.65); ctx.stroke();

function drawBearPaw(bear) {

  const tipY=WATER_TOP+ext*(bear.reach-WATER_TOP);
  bear.hx=bear.x; bear.hy=tipY; bear.hr=ext>0.12?16:-1;
  ctx.save(); ctx.translate(bear.x,tipY);
  const armH=220;
  ctx.fillStyle='#6A4A08'; ctx.beginPath(); ctx.roundRect(-20,-armH,40,armH,12); ctx.fill();
  ctx.fillStyle='#8A6018'; ctx.beginPath(); ctx.roundRect(-15,-armH+5,30,armH-10,9); ctx.fill();
  ctx.fillStyle='#2e1a04'; ctx.beginPath(); ctx.ellipse(0,5,26,21,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1e1004'; ctx.beginPath(); ctx.ellipse(0,7,19,15,0,0,Math.PI*2); ctx.fill();
  [[-15,19],[-5,23],[5,23],[15,19]].forEach(([cx,cy])=>{
    ctx.fillStyle='#F0E0B0'; ctx.beginPath(); ctx.ellipse(cx,cy,5,13,cx<0?-0.15:0.15,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#D8C890'; ctx.beginPath(); ctx.ellipse(cx,cy,3.5,9,cx<0?-0.15:0.15,0,Math.PI*2); ctx.fill();

  [[-9,3],[0,7],[9,3]].forEach(([bx,by])=>{
    ctx.fillStyle='#5A3010'; ctx.beginPath(); ctx.arc(bx,by,5,0,Math.PI*2); ctx.fill();

function drawNet(n) {
  const gY=n.gapY, gH=n.gapH;
  ctx.strokeStyle='rgba(210,185,100,0.75)'; ctx.lineWidth=2;
  for (let nx=n.x+4;nx<n.x+22;nx+=9) {
    ctx.beginPath(); ctx.moveTo(nx,WATER_TOP); ctx.lineTo(nx,gY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(nx,gY+gH); ctx.lineTo(nx,WATER_BOT); ctx.stroke();

function drawHeart(h) {

// ─────────────────────────────────────────────────────────────
//  SPAWN SYSTEM
// ─────────────────────────────────────────────────────────────
function rn(mn,mx) { return mn+Math.random()*(mx-mn); }
function ri(mn,mx) { return Math.floor(rn(mn,mx+1)); }

function spawnObjects() {
  const sm=1+(level-1)*0.09;

  ST.hook--;
  if (ST.hook<=0) {
    hooks.push({ x:W+20, len:rn(38,WATER_BOT-WATER_TOP-70) });
    ST.hook=ri(260,420)/sm;
  }
  ST.bottle--;
  if (ST.bottle<=0) {
    bottles.push({ x:W+20, y:rn(WATER_TOP+50,WATER_BOT-65) });
    ST.bottle=ri(200,340)/sm;
  }
  ST.bear--;
  if (ST.bear<=0) {
    bears.push({ x:rn(100,W-100), reach:rn(140,WATER_BOT-90), timer:0, duration:ri(80,130) });
    ST.bear=ri(680,1100)/sm;
  }
  ST.net--;
  if (ST.net<=0&&level>=2) {
    const gapY=rn(WATER_TOP+65,WATER_BOT-130);
    nets.push({ x:W+20, gapY, gapH:82+rn(0,42) });
    ST.net=ri(1400,2100)/sm;
  }
  ST.rock--;
  if (ST.rock<=0) {
    const w2=ri(18,36),h2=ri(10,18);
    rocks.push({ x:W+30, y:WATER_BOT-h2-ri(0,20), w:w2, h:h2, tilt:rn(-0.4,0.4), hue:ri(20,50) });
    ST.rock=ri(280,460)/sm;
  }
  ST.worm--;
  if (ST.worm<=0) {
    const rnd=Math.random();
    let col='#8B4513',pts=50;
    if (rnd>0.9) { col='#FFD700';pts=250; }
    else if (rnd>0.55) { col='#CC2200';pts=100; }
    worms.push({ x:W+20, y:rn(WATER_TOP+55,WATER_BOT-70), col, pts, wave:Math.random()*6.28 });
    ST.worm=ri(52,98)/sm;
    if (Math.random()<0.05) frogs.push({ x:W+80+Math.random()*80, y:rn(WATER_TOP+60,WATER_BOT-80) });
  }
  ST.heart--;
  if (ST.heart<=0) {
    hearts.push({ x:W+60, y:rn(WATER_TOP+30,WATER_BOT-60), spd:rn(0.4,0.8), xSpd:scrollSpeed() });
    ST.heart=ri(290,480);
  }
  // Q-marks: max 2 on screen at a time
  const qTarget=2;
  while (qmarks.length<qTarget) {
    const rd=Math.random();
    const diff=rd<0.45?'green':rd<0.75?'yellow':'red';
    qmarks.push({ x:W+60+Math.random()*150, y:rn(WATER_TOP+55,WATER_BOT-80), diff });
  }
  // Caves: level 3+
  ST.cave--;
  if (ST.cave<=0&&level>=3) {
    const centerY=rn(WATER_TOP+110,WATER_BOT-130);
    caves.push({ x:W+20, centerY, len:ri(520,840),
      waveAmp:ri(18,42), waveFreq:rn(0.016,0.028), wavePhase:Math.random()*6.28,
      gapH:156 });
    ST.cave=ri(1200,1800)/sm;
  }
}

// ─────────────────────────────────────────────────────────────
//  CAVE DRAWING
// ─────────────────────────────────────────────────────────────
function caveCenterY(c,ox) { return c.centerY+c.waveAmp*Math.sin(c.waveFreq*ox+c.wavePhase); }

function drawCave(c) {
  const steps=Math.ceil(c.len/5)+1, dx=c.len/steps;
  // ceiling
  ctx.beginPath();
  ctx.moveTo(c.x,WATER_TOP);
  for (let i=0;i<=steps;i++) { const ox=i*dx; ctx.lineTo(c.x+ox,caveCenterY(c,ox)-c.gapH/2); }
  ctx.lineTo(c.x+c.len,WATER_TOP); ctx.closePath();
  const cg=ctx.createLinearGradient(0,WATER_TOP,0,WATER_TOP+60);
  cg.addColorStop(0,'#2a1e0a'); cg.addColorStop(1,'#4a3318');
  ctx.fillStyle=cg; ctx.fill();
  // floor
  ctx.beginPath();
  ctx.moveTo(c.x,WATER_BOT);
  for (let i=0;i<=steps;i++) { const ox=i*dx; ctx.lineTo(c.x+ox,caveCenterY(c,ox)+c.gapH/2); }
  ctx.lineTo(c.x+c.len,WATER_BOT); ctx.closePath();
  const fg=ctx.createLinearGradient(0,WATER_BOT-60,0,WATER_BOT);
  fg.addColorStop(0,'#4a3318'); fg.addColorStop(1,'#2a1e0a');
  ctx.fillStyle=fg; ctx.fill();
  // highlight edges
  ctx.strokeStyle='#6a4a28'; ctx.lineWidth=2;
  ctx.beginPath();
  for (let i=0;i<=steps;i++) { const ox=i*dx; const y=caveCenterY(c,ox)-c.gapH/2; i===0?ctx.moveTo(c.x+ox,y):ctx.lineTo(c.x+ox,y); }
  ctx.stroke();
  ctx.beginPath();
  for (let i=0;i<=steps;i++) { const ox=i*dx; const y=caveCenterY(c,ox)+c.gapH/2; i===0?ctx.moveTo(c.x+ox,y):ctx.lineTo(c.x+ox,y); }
  ctx.stroke();
}

// ─────────────────────────────────────────────────────────────
//  COLLISION
// ─────────────────────────────────────────────────────────────
function cc(ax,ay,ar,bx,by,br) {
  const dx=ax-bx,dy=ay-by;
  return dx*dx+dy*dy<(ar+br)*(ar+br);
}

function checkCollisions() {
  const px=player.x,py=player.y;
  if (invincible<=0) {
    for (const h of hooks) {
      if (h.hr&&cc(px,py,COLL_R,h.hx,h.hy,h.hr)) { takeDamage(); return; }
    }
    for (const b of bottles) {
      if (b.hr&&cc(px,py,COLL_R,b.hx,b.hy,b.hr)) { takeDamage(); return; }
    }
    for (const bear of bears) {
      if (bear.hr>0&&cc(px,py,COLL_R,bear.hx,bear.hy,bear.hr)) { takeDamage(); return; }
    }
    for (const r2 of rocks) {
      if (r2.hr&&cc(px,py,COLL_R,r2.hx,r2.hy,r2.hr)) { takeDamage(); return; }
    }
    for (const n of nets) {
      if (n.hT) {
        const nt=n.hT;
        if (Math.abs(px-nt.cx)<nt.hw+COLL_R&&Math.abs(py-nt.cy)<nt.hh+COLL_R) { takeDamage(); return; }
      }
      if (n.hB) {
        const nb=n.hB;
        if (Math.abs(px-nb.cx)<nb.hw+COLL_R&&Math.abs(py-nb.cy)<nb.hh+COLL_R) { takeDamage(); return; }
      }
    }
    for (const c of caves) {
      if (px>=c.x&&px<=c.x+c.len) {
        const cenY=caveCenterY(c,px-c.x);
        if (py-COLL_R<cenY-c.gapH/2||py+COLL_R>cenY+c.gapH/2) { takeDamage(); return; }
      }
    }
  } else invincible--;

  for (let i=worms.length-1;i>=0;i--) {
    const w=worms[i];
    if (cc(px,py,18,w.hx||w.x,w.hy||w.y+17,16)) {
      score+=w.pts; sfxCollect(w.pts);
      strength=Math.min(100,strength+(w.pts===50?8:w.pts===100?14:22));
      worms.splice(i,1);
    }
  }
  for (let i=frogs.length-1;i>=0;i--) {
    const f=frogs[i];
    if (cc(px,py,18,f.hx||f.x,f.hy||f.y,20)) {
      score+=2500; sfxFrog(); frogs.splice(i,1);
    }
  }
  for (let i=hearts.length-1;i>=0;i--) {
    const h=hearts[i];
    if (cc(px,py,18,h.hx||h.x,h.hy||h.y+9,15)) {
      health=Math.min(10,health+1); sfxHeart(); hearts.splice(i,1);
    }
  }
  for (let i=qmarks.length-1;i>=0;i--) {
    const q=qmarks[i];
    if (cc(px,py,18,q.hx||q.x,q.hy||q.y,22)) {
      openQuestion(q.diff); qmarks.splice(i,1); break;
    }
  }
}

function takeDamage() {
  if (invincible>0) return;
  health--; sfxHit();
  stunTimer=35; invincible=75;
  if (health<=0) { health=0; state='GAMEOVER'; if(score>highScore) highScore=score; }
}

// ─────────────────────────────────────────────────────────────
//  QUESTIONS
// ─────────────────────────────────────────────────────────────
function optPositions(n) {
  if (n===2) return [[100,330,330,66],[464,330,330,66]];
  if (n===3) return [[100,268,330,66],[464,268,330,66],[282,352,330,66]];
  return [[100,268,330,66],[464,268,330,66],[100,352,330,66],[464,352,330,66]];
}
function openQuestion(diff) {
  const q=pickQuestion(diff);
  const count=diff==='red'?2:diff==='yellow'?3:4;
  // pick `count` options: always include correct answer + random wrong ones
  const wrongs=[0,1,2,3].filter(i=>i!==q.a);
  for (let i=wrongs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[wrongs[i],wrongs[j]]=[wrongs[j],wrongs[i]];}
  const chosen=[...wrongs.slice(0,count-1),q.a];
  for (let i=chosen.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[chosen[i],chosen[j]]=[chosen[j],chosen[i]];}
  curQ={ ...q, o:chosen.map(i=>q.o[i]), a:chosen.indexOf(q.a), _diff:diff, _sel:-1 };
  qResult=null; state='QUESTION';
}
function answerQ(idx) {
  if (qResult!==null) return;
  curQ._sel=idx;
  if (idx===curQ.a) {
    qResult='correct'; sfxRight();
    strength=Math.min(100,strength+20); score+=250;
  } else {
    qResult='wrong'; sfxWrong(); takeDamage();
  }
  qTimer=100;
}
function triggerStrengthQuestion() {
  const rd=Math.random();
  openQuestion(rd<0.45?'green':rd<0.75?'yellow':'red');
}
function dismissQuestion() {
  if (awaitingStrength) {
    if (strength>=jumpThreshold()) { awaitingStrength=false; startJump(); return; }
    triggerStrengthQuestion(); return;
  }
  state='PLAYING'; curQ=null; qResult=null;
}

function drawQuestion() {
  ctx.fillStyle='rgba(0,8,26,0.78)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#070e24';
  ctx.beginPath(); ctx.roundRect(72,72,756,424,18); ctx.fill();
  const dc=QC[curQ._diff];
  ctx.strokeStyle=dc; ctx.lineWidth=3;
  ctx.beginPath(); ctx.roundRect(72,72,756,424,18); ctx.stroke();
  ctx.fillStyle=dc;
  ctx.beginPath(); ctx.roundRect(W/2-56,62,112,24,8); ctx.fill();
  ctx.fillStyle='white'; ctx.font='bold 12px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(curQ._diff.toUpperCase()+' QUESTION',W/2,74);
  ctx.fillStyle='white'; ctx.font='bold 18px Arial'; ctx.textAlign='center'; ctx.textBaseline='top';
  wrapText(curQ.q,W/2,106,680,27);
  const labels=['A','B','C','D'];
  const pos=optPositions(curQ.o.length);
  curQ.o.forEach((opt,i)=>{
    const [ox,oy,ow,oh]=pos[i];
    let bg='#101e40';
    if (qResult!==null) {
      if (i===curQ.a) bg='#003a00';
      else if (i===curQ._sel&&i!==curQ.a) bg='#3a0000';
    }
    ctx.fillStyle=bg; ctx.beginPath(); ctx.roundRect(ox,oy,ow,oh,10); ctx.fill();
    let bc='#2a3a66';
    if (qResult!==null&&i===curQ.a) bc='#44FF44';
    if (qResult!==null&&i===curQ._sel&&i!==curQ.a) bc='#FF4444';
    ctx.strokeStyle=bc; ctx.lineWidth=qResult!==null&&(i===curQ.a||i===curQ._sel)?2.5:1.5; ctx.stroke();
    ctx.fillStyle=dc; ctx.font='bold 16px Arial'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(labels[i]+'.', ox+14, oy+oh/2);
    ctx.fillStyle='white'; ctx.font='14px Arial';
    ctx.fillText(opt, ox+38, oy+oh/2);
  });
  const keyHint='A / B'+(curQ.o.length>2?' / C':'')+(curQ.o.length>3?' / D':'');
  if (qResult==='correct') {
    ctx.fillStyle='#44FF88'; ctx.font='bold 21px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✓  Correct!  +20 Strength  +250 pts',W/2,436);
    ctx.fillStyle='rgba(100,255,160,0.7)'; ctx.font='13px Arial';
    ctx.fillText('Click or any key to continue',W/2,461);
  } else if (qResult==='wrong') {
    ctx.fillStyle='#FF5555'; ctx.font='bold 21px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✗  Wrong answer  —1 Health',W/2,436);
    ctx.fillStyle='rgba(255,150,150,0.7)'; ctx.font='13px Arial';
    ctx.fillText('Click or any key to continue',W/2,461);
  } else {
    ctx.fillStyle='#88CCFF'; ctx.font='14px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Click an answer  or  press  '+keyHint,W/2,450);
  }
  if (awaitingStrength) {
    const thr=jumpThreshold();
    ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(72,480,756,28);
    const pct=Math.min(strength/thr,1);
    ctx.fillStyle='#FF7700'; ctx.fillRect(72,480,756*pct,28);
    ctx.fillStyle='white'; ctx.font='bold 13px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`Strength to jump: ${Math.floor(strength)}% / ${thr}%  — correct answers fill the bar`,W/2,494);
  }
}

function wrapText(text,cx,y,maxW,lineH) {
  const words=text.split(' ');
  let line='';
  for (const w of words) {
    const test=line+w+' ';
    if (ctx.measureText(test).width>maxW&&line!=='') {
      ctx.fillText(line.trim(),cx,y); line=w+' '; y+=lineH;
    } else line=test;
  }
  ctx.fillText(line.trim(),cx,y);
}

// ─────────────────────────────────────────────────────────────
//  JUMP SCENE
// ─────────────────────────────────────────────────────────────
function getJumpSpeed() { return powerVal*powerVal*22; }
function getJumpAngle() { return -Math.PI*(0.12+angleVal*0.38); }

function drawJumpScene() {
  const L=jumpLayout();
  const P=getJumpPonds(L);
  ctx.fillStyle='#5870E8'; ctx.fillRect(0,0,W,H);
  [[70,48,110,24],[290,30,80,18],[540,54,100,22],[740,38,75,18]].forEach(([cx,cy,cw,ch])=>{
    ctx.fillStyle='#E8EEFF';
    ctx.fillRect(cx,cy,cw,ch); ctx.fillRect(cx-12,cy+7,cw+24,ch);
    ctx.fillRect(cx+7,cy-7,cw-14,ch+4);
  });
  // Left pond (both layouts)
  ctx.fillStyle='#1040C0'; ctx.fillRect(0,L.LP_SRF,L.LP_R,L.LP_BANK-L.LP_SRF);
  ctx.fillStyle='#40A020'; ctx.fillRect(0,L.LP_SRF-4,L.LP_R,4);
  ctx.fillStyle='#704010'; ctx.fillRect(0,L.LP_BANK,L.LP_R,H-L.LP_BANK);
  if (L.two) {
    // Staircase: rising slope LP→MP
    ctx.fillStyle='#704010';
    ctx.beginPath(); ctx.moveTo(L.LP_R,L.LP_BANK); ctx.lineTo(L.MP_L,L.MP_SRF);
    ctx.lineTo(L.MP_L,H); ctx.lineTo(L.LP_R,H); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#40A020'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(L.LP_R,L.LP_BANK); ctx.lineTo(L.MP_L,L.MP_SRF); ctx.stroke();
    // Middle pond
    ctx.fillStyle='#1040C0'; ctx.fillRect(L.MP_L,L.MP_SRF,L.MP_R-L.MP_L,L.MP_BANK-L.MP_SRF);
    ctx.fillStyle='#40A020'; ctx.fillRect(L.MP_L,L.MP_SRF-4,L.MP_R-L.MP_L,4);
    ctx.fillStyle='#704010'; ctx.fillRect(L.MP_L,L.MP_BANK,L.MP_R-L.MP_L,H-L.MP_BANK);
    ctx.fillStyle='#4A2808'; ctx.fillRect(L.MP_L-10,L.MP_SRF,10,L.MP_BANK-L.MP_SRF);
    ctx.fillStyle='#301c04'; ctx.fillRect(L.MP_L-12,L.MP_SRF-4,12,6);
    // Rising slope MP→RP
    ctx.fillStyle='#704010';
    ctx.beginPath(); ctx.moveTo(L.MP_R,L.MP_SRF); ctx.lineTo(L.RP_L,L.RP_SRF);
    ctx.lineTo(L.RP_L,H); ctx.lineTo(L.MP_R,H); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#40A020'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(L.MP_R,L.MP_SRF); ctx.lineTo(L.RP_L,L.RP_SRF); ctx.stroke();
  } else {
    // Flat connecting ground (single jump)
    ctx.fillStyle='#704010';
    ctx.beginPath(); ctx.moveTo(L.LP_R,L.LP_BANK); ctx.lineTo(L.RP_L,L.RP_BANK);
    ctx.lineTo(L.RP_L,H); ctx.lineTo(L.LP_R,H); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#40A020'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(L.LP_R,L.LP_BANK); ctx.lineTo(L.RP_L,L.RP_BANK); ctx.stroke();
  }
  // Right pond (both layouts)
  ctx.fillStyle='#1040C0'; ctx.fillRect(L.RP_L,L.RP_SRF,L.RP_R-L.RP_L,L.RP_BANK-L.RP_SRF);
  ctx.fillStyle='#40A020'; ctx.fillRect(L.RP_L,L.RP_SRF-4,L.RP_R-L.RP_L,4);
  ctx.fillStyle='#704010'; ctx.fillRect(L.RP_L,L.RP_BANK,L.RP_R-L.RP_L,H-L.RP_BANK);
  ctx.fillStyle='#4A2808'; ctx.fillRect(L.RP_L-10,L.RP_SRF,10,L.RP_BANK-L.RP_SRF);
  ctx.fillStyle='#301c04'; ctx.fillRect(L.RP_L-12,L.RP_SRF-4,12,6);
  // Shimmer in all ponds
  const ponds=L.two?[[0,L.LP_R,L.LP_SRF],[L.MP_L,L.MP_R,L.MP_SRF],[L.RP_L,L.RP_R,L.RP_SRF]]:[[0,L.LP_R,L.LP_SRF],[L.RP_L,L.RP_R,L.RP_SRF]];
  ponds.forEach(([x0,x1,srf])=>{
    ctx.fillStyle='#2060E0';
    for (let wx=x0+8;wx<x1-16;wx+=30) ctx.fillRect(wx,srf+6,14,4);
    ctx.fillStyle='rgba(64,128,255,0.65)';
    const sh=(t*0.4|0)%30;
    for (let wx=x0+4;wx<x1-20;wx+=38) ctx.fillRect(wx+sh,srf+2,10,3);
  });
  // Pixel bubbles in ponds
  for (const b of bubbles) {
    let inP=b.x<L.LP_R&&b.y>L.LP_SRF&&b.y<L.LP_BANK;
    if (L.two) inP=inP||(b.x>L.MP_L&&b.x<L.MP_R&&b.y>L.MP_SRF&&b.y<L.MP_BANK);
    inP=inP||(b.x>L.RP_L&&b.y>L.RP_SRF&&b.y<L.RP_BANK);
    if (inP) { ctx.fillStyle='rgba(160,210,255,0.5)'; ctx.fillRect(b.x-2,b.y-2,4,4); }
  }
  // Target zone (active, with narrowing landing window)
  const TL=P.tgtL+8, TW=L.landW, TSrf=P.tgtSRF, TBank=P.tgtBANK;
  const pulse=Math.floor(t*0.06)%2;
  if (jp<3||jumpResult==='win') {
    ctx.fillStyle=pulse?'rgba(255,255,80,0.22)':'rgba(255,255,80,0.07)';
    ctx.fillRect(TL,TSrf+2,TW,TBank-TSrf-4);
    ctx.strokeStyle='#FFFF44'; ctx.lineWidth=2; ctx.setLineDash([6,4]);
    ctx.strokeRect(TL,TSrf+2,TW,TBank-TSrf-4);
    ctx.setLineDash([]);
    ctx.fillStyle='#FFFF88'; ctx.font='bold 13px "Courier New"'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('LAND HERE',TL+TW/2,TSrf+9);
  }
  // Wind indicator
  if (level>=3&&jp<2) drawWindIndicator();
  // 8-bit salmon
  if (jp<=1) draw8bitSalmon(jX,jY,0);
  else if (jp===2) { draw8bitSalmon(jX,jY,Math.atan2(jVY,jVX)); }
  else if (jp===3&&jumpResult==='win') draw8bitSalmon(jX,jY,0);

  // Power bar
  const pbX=22,pbY=110,pbW=36,pbH=250;
  ctx.fillStyle='#000820'; ctx.fillRect(pbX-5,pbY-30,pbW+10,pbH+60);
  ctx.fillStyle='#3840A0'; ctx.fillRect(pbX-3,pbY-28,pbW+6,pbH+56);
  ctx.fillStyle='#000820'; ctx.fillRect(pbX,pbY,pbW,pbH);
  const fh=pbH*powerVal;
  const pc=powerVal>.82?'#FF3030':powerVal>.52?'#FFCC00':'#30FF60';
  if (fh>0) { ctx.fillStyle=pc; ctx.fillRect(pbX,pbY+pbH-fh,pbW,fh); }
  for (let i=1;i<5;i++) { ctx.fillStyle='#1a2a58'; ctx.fillRect(pbX,pbY+pbH*(1-i/5)-1,pbW,2); }
  ctx.fillStyle='#AAAAFF'; ctx.font='bold 11px "Courier New"'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('POWER',pbX+pbW/2,pbY-3);
  ctx.fillStyle=pc; ctx.font='bold 13px "Courier New"'; ctx.textBaseline='top';
  ctx.fillText(Math.round(powerVal*100)+'%',pbX+pbW/2,pbY+pbH+5);
  if (jp>=1) {
    ctx.strokeStyle='#FFCC00'; ctx.lineWidth=3; ctx.strokeRect(pbX-1,pbY-1,pbW+2,pbH+2);
    ctx.fillStyle='#FFCC00'; ctx.font='bold 9px "Courier New"'; ctx.textBaseline='top';
    ctx.fillText('LOCKED',pbX+pbW/2,pbY+pbH+21);
  } else {
    ctx.fillStyle='#7070AA'; ctx.font='9px "Courier New"'; ctx.textBaseline='top';
    ctx.fillText('[SPACE]',pbX+pbW/2,pbY+pbH+21);
  }

  // Angle dial
  const acX=108,acY=432,acR=60;
  ctx.fillStyle='#000820'; ctx.beginPath(); ctx.arc(acX,acY,acR+14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3840A0'; ctx.beginPath(); ctx.arc(acX,acY,acR+11,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000820'; ctx.beginPath(); ctx.arc(acX,acY,acR,-Math.PI,0,false); ctx.lineTo(acX,acY); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#181830'; ctx.beginPath(); ctx.arc(acX,acY,acR,0,Math.PI); ctx.lineTo(acX,acY); ctx.closePath(); ctx.fill();
  [{s:Math.PI,e:Math.PI*1.18,c:'#441800'},{s:Math.PI*1.18,e:Math.PI*1.52,c:'#003300'},{s:Math.PI*1.52,e:Math.PI*1.62,c:'#441800'},{s:Math.PI*1.62,e:Math.PI*2,c:'#440000'}].forEach(z=>{
    ctx.strokeStyle=z.c; ctx.lineWidth=20;
    ctx.beginPath(); ctx.arc(acX,acY,acR-6,z.s,z.e); ctx.stroke();
  });
  ctx.strokeStyle='#00BB00'; ctx.lineWidth=12;
  ctx.beginPath(); ctx.arc(acX,acY,acR-6,Math.PI*1.22,Math.PI*1.5); ctx.stroke();
  const needleAng=getJumpAngle();
  const nx2=acX+Math.cos(needleAng)*acR, ny2=acY+Math.sin(needleAng)*acR;
  ctx.strokeStyle=jp>=1?'#FFCC00':'#FFFFFF'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(acX,acY); ctx.lineTo(nx2,ny2); ctx.stroke();
  ctx.fillStyle=jp>=1?'#FFCC00':'#FFFFFF'; ctx.beginPath(); ctx.arc(nx2,ny2,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#8888FF'; ctx.beginPath(); ctx.arc(acX,acY,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#AAAAFF'; ctx.font='bold 11px "Courier New"'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  ctx.fillText('ANGLE',acX,acY-acR-16);
  if (jp===1) {
    ctx.fillStyle='#FFCC00'; ctx.font='bold 9px "Courier New"'; ctx.textBaseline='top';
    ctx.fillText('LOCKED',acX,acY+8);
  } else if (jp===0) {
    ctx.fillStyle='#7070AA'; ctx.font='9px "Courier New"'; ctx.textBaseline='top';
    ctx.fillText('[SPACE]',acX,acY+8);
  }

  // Trajectory preview (accounts for wind)
  if (jp===1) {
    const spd=getJumpSpeed(),ang=getJumpAngle();
    let tx=jX,ty=jY,tvx=Math.cos(ang)*spd,tvy=Math.sin(ang)*spd;
    for (let i=0;i<110;i++) {
      tvy+=JUMP_GRAV; tx+=tvx+windForce; ty+=tvy;
      if (i%4===0&&tx<W+10&&ty<H+10&&tx>0) {
        const a=Math.max(0.08,1-i/110);
        ctx.fillStyle=`rgba(255,255,80,${a*0.72})`;
        ctx.fillRect(tx-3,ty-3,6,6);
      }
      if (ty>H+20||tx>W+20) break;
    }
  }

  // Phase prompt
  if (jp<2) {
    const ph=L.two?`  [Jump ${jumpPhase+1}/2]`:'';
    const prompts=['Stop the POWER bar!  [SPACE]'+ph,'Set ANGLE, then LAUNCH  [SPACE]  ·  Hold SPACE to steer up'];
    ctx.fillStyle='rgba(0,6,24,0.9)'; ctx.fillRect(208,13,484,30);
    ctx.fillStyle='#AACCFF'; ctx.font='bold 12px "Courier New"'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(prompts[jp],450,28);
  }

  // Result overlay
  if (jp===3) {
    jumpTimer++;
    const al=Math.min(jumpTimer/18,1);
    if (jumpResult==='win') {
      ctx.fillStyle=`rgba(0,50,0,${al*0.85})`; ctx.fillRect(200,155,500,200);
      ctx.fillStyle=`rgba(80,255,80,${al})`; ctx.font='bold 42px "Courier New"'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('SPLASH!',W/2,230);
      ctx.fillStyle=`rgba(180,255,180,${al})`; ctx.font='bold 20px "Courier New"';
      ctx.fillText('+'+(level*500).toLocaleString()+' PTS  ·  LEVEL UP!',W/2,282);
      ctx.font='12px "Courier New"'; ctx.fillStyle=`rgba(160,255,160,${al})`;
      ctx.fillText('[SPACE] to continue',W/2,320);
    } else {
      ctx.fillStyle=`rgba(60,0,0,${al*0.85})`; ctx.fillRect(200,155,500,200);
      ctx.fillStyle=`rgba(255,80,80,${al})`; ctx.font='bold 42px "Courier New"'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('MISSED!',W/2,230);
      ctx.fillStyle=`rgba(255,190,190,${al})`; ctx.font='bold 20px "Courier New"';
      ctx.fillText('-5% SCORE  (attempt '+(jumpAttempts+1)+')',W/2,282);
      ctx.font='12px "Courier New"'; ctx.fillStyle=`rgba(255,170,170,${al})`;
      ctx.fillText('[SPACE] to try again',W/2,320);
    }
  }

  // Level / score badge
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(W-118,8,108,44);
  ctx.fillStyle='#FFD700'; ctx.font='bold 12px "Courier New"'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('LEVEL '+level,W-64,22);
  ctx.fillStyle='#88DDFF'; ctx.font='10px "Courier New"';
  ctx.fillText(L.two?'2 JUMPS':'GAP x'+level,W-64,38);
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(W-118,60,108,30);
  ctx.fillStyle='white'; ctx.font='bold 11px "Courier New"'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(score.toLocaleString(),W-64,75);
}

function draw8bitSalmon(x,y,ang) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(ang);
  ctx.fillStyle='#C04010'; ctx.fillRect(-24,-6,9,6); ctx.fillRect(-24,0,9,6);

// ─────────────────────────────────────────────────────────────
//  UPDATE — SWIMMING
// ─────────────────────────────────────────────────────────────
function updatePlayer() {
  player.vy += player.spaceHeld ? -HELI_FORCE : HELI_FORCE;
  player.vy = Math.max(-MAX_VY, Math.min(MAX_VY, player.vy));
  player.y += player.vy;
  player.y = Math.max(WATER_TOP+10, Math.min(WATER_BOT-16, player.y));
  if (player.y===WATER_TOP+10||player.y===WATER_BOT-16) player.vy=0;
}

function updateObjects() {
  const baseSp=scrollSpeed();
  let sp=baseSp;
  if (boostHeld && strength>0 && state==='PLAYING') {
    sp+=BOOST_EXTRA;
    strength=Math.max(0,strength-BOOST_DRAIN);
  }
  scrollDist+=sp;
  hooks.forEach(h=>h.x-=sp);
  bottles.forEach(b=>b.x-=sp*0.72);
  bears.forEach(b=>b.timer++);
  nets.forEach(n=>n.x-=sp*0.82);
  rocks.forEach(r=>r.x-=sp);
  worms.forEach(w=>{w.x-=sp*0.62;w.y+=Math.sin(t*0.09+w.wave)*0.35;});
  frogs.forEach(f=>f.x-=sp*0.52);
  hearts.forEach(h=>{h.x-=h.xSpd;h.y+=h.spd;});
  qmarks.forEach(q=>q.x-=sp*0.48);
  caves.forEach(c=>c.x-=sp);
  const ox=-80;
  hooks    =hooks   .filter(h=>h.x>ox);
  bottles  =bottles .filter(b=>b.x>ox);
  bears    =bears   .filter(b=>b.timer<b.duration+30);
  nets     =nets    .filter(n=>n.x>ox);
  rocks    =rocks   .filter(r=>r.x>-r.w-20);
  worms    =worms   .filter(w=>w.x>ox);
  frogs    =frogs   .filter(f=>f.x>ox);
  hearts   =hearts  .filter(h=>h.y<WATER_BOT+20&&h.x>-40);
  qmarks   =qmarks  .filter(q=>q.x>ox);
  caves    =caves   .filter(c=>c.x+c.len>ox);
}

// ─────────────────────────────────────────────────────────────
//  UPDATE — JUMP
// ─────────────────────────────────────────────────────────────
function slopeHit(L) {
  if (jumpPhase===0&&jX>L.LP_R&&jX<L.MP_L) {
    const sy=L.LP_BANK+(L.MP_SRF-L.LP_BANK)*(jX-L.LP_R)/(L.MP_L-L.LP_R);
    return jY>=sy;
  }
  if (jumpPhase===1&&jX>L.MP_R&&jX<L.RP_L) {
    const sy=L.MP_SRF+(L.RP_SRF-L.MP_SRF)*(jX-L.MP_R)/(L.RP_L-L.MP_R);
    return jY>=sy;
  }
  return false;
}

function updateJump() {
  const barSpeed=0.010+(level-1)*0.0026;
  if (jp===0) {
    powerVal+=powerDir*barSpeed;
    if (powerVal>=1){powerVal=1;powerDir=-1;}
    if (powerVal<=0){powerVal=0;powerDir=1;}
  }
  if (jp===1) {
    angleVal+=angleDir*(barSpeed*0.9);
    if (angleVal>=1){angleVal=1;angleDir=-1;}
    if (angleVal<=0){angleVal=0;angleDir=1;}
  }
  if (jp===2) {
    if (player.spaceHeld) jVY-=0.28;
    jVY+=JUMP_GRAV; jX+=jVX+windForce; jY+=jVY;
    const L=jumpLayout();
    const P=getJumpPonds(L);
    if (jX>P.srcR+10) jHasLeft=true;
    // Win: landed in target zone
    if (jX>=P.tgtL+8&&jX<=P.tgtL+8+L.landW&&jY>=P.tgtSRF&&jY<P.tgtBANK) {
      if (L.two&&jumpPhase===0) {
        // Intermediate landing — start phase 2
        sfxSplash(); score+=level*250;
        jumpPhase=1; jp=0;
        powerVal=0;powerDir=1;angleVal=0;angleDir=1;
        jX=L.MP_L+55; jY=L.MP_SRF+28;
        jVX=0;jVY=0;jHasLeft=false; generateWind();
      } else {
        jp=3; jumpResult='win'; jumpTimer=0; sfxSplash(); score+=level*500;
      }
    } else if (
      (jX>=P.tgtL-14&&jX<=P.tgtL+2&&jY>=P.tgtSRF)||              // hit cliff wall
      (jY>=P.srcBANK&&jX>P.srcR-10&&jX<P.tgtL+4)||                // fell in gap
      (jHasLeft&&jY>=P.srcSRF&&jX<=P.srcR)||                       // fell back into source
      (jX>P.tgtL+8+L.landW&&jY>=P.tgtSRF&&jX<=P.tgtR)||           // overshot landing zone
      (L.two&&slopeHit(L))||                                        // hit a slope ramp
      jY>H+20||jX>W+40
    ) {
      jp=3; jumpResult='fail'; jumpTimer=0; sfxMiss();
      score=Math.max(0,Math.floor(score*0.95)); jumpAttempts++;
    }
  }
}

// ─────────────────────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────────────────────
let spaceDown=false;
document.addEventListener('keydown',e=>{
  if (e.code==='Space') {
    e.preventDefault(); player.spaceHeld=true;
    if (!spaceDown) { spaceDown=true; handleSpace(); }
  }
  if (state==='QUESTION') {
    if (qResult!==null) { dismissQuestion(); return; }
    const map={KeyA:0,KeyB:1,KeyC:2,KeyD:3};
    const idx=map[e.code];
    if (idx!==undefined&&idx<curQ.o.length) answerQ(idx);
  }
});
document.addEventListener('keyup',e=>{
  if (e.code==='Space') { spaceDown=false; player.spaceHeld=false; }
  if (e.code==='KeyW') boostHeld=false;
});
document.addEventListener('keydown',e=>{
  if (e.code==='KeyW'&&state==='PLAYING') { e.preventDefault(); boostHeld=true; }
},true);
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  if (state==='QUESTION') {
    if (qResult!==null) { dismissQuestion(); return; }
    optPositions(curQ.o.length).forEach(([ox,oy,ow,oh],i)=>{
      if (mx>=ox&&mx<=ox+ow&&my>=oy&&my<=oy+oh) { curQ._sel=i; answerQ(i); }
    });
  }
  if (state==='START')    startGame();
  if (state==='GAMEOVER') initGame();
});

function handleSpace() {
  if (state==='START')    { startGame(); return; }
  if (state==='GAMEOVER') { initGame();  return; }
  if (state==='QUESTION') { if (qResult!==null) dismissQuestion(); return; }
  if (state==='JUMP') {
    if (jp===0) { jp=1; }
    else if (jp===1) {
      jp=2;
      const spd=getJumpSpeed(),ang=getJumpAngle();
      jVX=Math.cos(ang)*spd; jVY=Math.sin(ang)*spd;
    } else if (jp===3) {
      if (jumpResult==='win') { level++; strength=0; startLevel(); }
      else {
        const L=jumpLayout();
        jp=0;powerVal=0;powerDir=1;angleVal=0;angleDir=1;jVX=0;jVY=0;jHasLeft=false;
        if (L.two&&jumpPhase===1) { jX=L.MP_L+55; jY=L.MP_SRF+28; }
        else { jumpPhase=0; jX=L.salmonStartX; jY=L.salmonStartY; }
        generateWind();
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────
//  INIT / LEVEL START
// ─────────────────────────────────────────────────────────────
function initGame() {
  level=1; score=0; health=10; strength=0; askedQs.clear();
  startLevel();
}
function startGame() { initGame(); }
function startLevel() {
  state='PLAYING';
  scrollDist=0; levelLength=5200+level*900;
  hooks=[];bottles=[];bears=[];nets=[];rocks=[];
  worms=[];frogs=[];hearts=[];qmarks=[];caves=[];
  resetST();
  player.y=290; player.vy=0;
  stunTimer=0; invincible=90; awaitingStrength=false;
  startMusic();
}
function startJump() {
  state='JUMP';
  jp=0; powerVal=0; powerDir=1; angleVal=0; angleDir=1;
  jumpPhase=0;
  const L=jumpLayout();
  jX=L.salmonStartX; jY=L.salmonStartY;
  jVX=0; jVY=0; jumpResult=''; jumpTimer=0; jumpAttempts=0; jHasLeft=false;
  generateWind();
}

// ─────────────────────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────────────────────
initBubbles();

function loop() {
  ctx.clearRect(0,0,W,H);

  if (state==='START') {
    drawBackground(); updateBubbles(); drawBubbles();
    drawStartScreen();
  }
  else if (state==='PLAYING') {
    updatePlayer(); updateObjects(); spawnObjects(); checkCollisions();
    updateBubbles(); drawBackground(); drawBubbles();
    caves.forEach(drawCave);
    nets.forEach(drawNet); rocks.forEach(drawRock); hooks.forEach(drawHook);
    qmarks.forEach(drawQMark); hearts.forEach(drawHeart); worms.forEach(drawWorm);
    frogs.forEach(drawFrog); bottles.forEach(drawBottle); bears.forEach(drawBearPaw);
    // Speed lines when boosting
    if (boostHeld&&strength>0) {
      const lineSeeds=[1.2,2.5,0.7,3.8,1.9,3.1,0.3];
      ctx.lineCap='round';
      lineSeeds.forEach((s,i)=>{
        const ly=player.y-30+i*10+Math.sin(t*0.18+s)*6;
        const llen=18+Math.sin(t*0.25+s*2)*10;
        const alpha=0.3+Math.sin(t*0.2+s)*0.2;
        ctx.strokeStyle=`rgba(255,220,80,${alpha})`;
        ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(player.x-50-llen,ly); ctx.lineTo(player.x-52,ly); ctx.stroke();
      });
    }
    drawSalmon(player.x,player.y);
    drawStunEffect(); drawHUD();
    if (scrollDist>=levelLength&&state==='PLAYING'&&!awaitingStrength) {
      if (strength>=jumpThreshold()) startJump();
      else { awaitingStrength=true; triggerStrengthQuestion(); }
    }
  }
  else if (state==='QUESTION') {
    drawBackground(); drawBubbles();
    caves.forEach(drawCave);
    nets.forEach(drawNet); rocks.forEach(drawRock); hooks.forEach(drawHook);
    qmarks.forEach(drawQMark); hearts.forEach(drawHeart); worms.forEach(drawWorm);
    frogs.forEach(drawFrog); bottles.forEach(drawBottle); bears.forEach(drawBearPaw);
    drawSalmon(player.x,player.y); drawHUD(); drawQuestion();
    if (qResult!==null) { qTimer--; if(qTimer<=0) dismissQuestion(); }
  }
  else if (state==='JUMP') {
    updateBubbles(0,H); updateJump(); drawJumpScene();
  }
  else if (state==='GAMEOVER') {
    drawBackground(); updateBubbles(); drawBubbles();
    drawGameOver();
  }
  t++;
  requestAnimationFrame(loop);
}

loop();
</script>
